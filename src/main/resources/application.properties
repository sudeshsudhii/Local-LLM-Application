spring.application.name=SpringAI-Ollama

# Ollama Configuration
ollama.api.url=http://localhost:11434
spring.ai.ollama.base-url=${ollama.api.url}
spring.ai.ollama.chat.options.model=qwen3:1.7b

# MongoDB Configuration
spring.data.mongodb.uri=mongodb://localhost:27017/deepseek

# CORS Configuration
app.cors.allowed-origins=http://localhost:3000

# Logging Configuration
logging.level.com.sudhii=DEBUG
logging.level.org.springframework.ai=INFO
logging.level.org.springframework.data.mongodb=WARN

# Swagger UI
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/v3/api-docs
